# autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

#########################################################################################
########## MONITORS #####################################################################
#########################################################################################
# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=nome,resolucao@freq,posicao,escala
# monitor=nome,resolucao@freq,1920x0, escala (monitor a direita)
# monitor=nome,resolucao@freq,-1920x0, escala (monitor a esquerda)
# monitor=nome,resolucao@freq,0x-1080, escala (monitor acima)
# monitor=nome,resolucao@freq,0x1080, escala (monitor abaixo)
monitor=Virtual-1,1920x1080@60.00Hz,0x0,1.0 
## (monitor virtual)
# monitor=eDP-1,1920x1080@60.00800,0x0,1.333334

#########################################################################################
########## MY PROGRAMS ##################################################################
#########################################################################################
# See https://wiki.hyprland.org/Configuring/Keywords/
# Set programs that you use
$terminal = konsole
$fileManager = dolphin
$menu = rofi -show drun -show-icons  
# $menu = rofi -show favorites -modi favorites:~/.config/rofi/rofi-favorites.sh
$internet_brownser = firefox
$simple_editor = mousepad

#########################################################################################
########## AUTOSTART ####################################################################
#########################################################################################
########## Autostart necessary processes (like notifications daemons, status bars, etc.)
########## Or execute your favorite apps at launch like this:
exec-once = nm-applet &
#  nm-tray & nm-connection-editor 
exec-once = waybar & hyprpaper
exec-once = kbuildsycoca6
exec-once = /usr/lib/polkit-kde-authentication-agent-1
# exec-once = /usr/lib/polkit-gnome/polkit-gone-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data

########## Inicia o COMPILADOR no Workspace 1 (Lado Esquerdo)
######### No caso do hyprladn e arm64 e ideal dessa maneira devido a inicializacao ser pelo flatpak #####
# exec-once = [workspace 1 silent; float; size 50% 100%; move 0 0] sasm
#### exec-once = /var/lib/flatpak/exports/bin/io.github.dman95.SASM  ### usar esse

########## Inicia o VLC no worspace 1 (Lado Direito)
########## No caso do hyprland arm64 o ideal e so colocar a primeira linha abaixo, senao inicial 2 telas uma 100% e outra 50% #####
# exec-once = [worspace 1 silent; float; size 50% 100%; move 50% 0] vlc
# exec-once = vlc
#### exec-once = sleep 4 && vlc  ###  usar esse

########## Inicia o Aprenda Assembler #######
# exec-once = /var/lib/flatpak/exports/bin/eu.jumplink.Learn6502

#########################################################################################
########## ENVIRONMENT VARIABLES ########################################################
#########################################################################################
# Resolve o problema de escala fracionária (1.33) no XWayland/Java
xwayland {
  force_zero_scaling = true
}

########## Fix para Java/PyCharm não piscar e renderizar menus corretamente
env = _JAVA_AWT_WM_NONREPARENTING,1
env = NO_AT_BRIDGE,1

# Variáveis para estabilizar aplicativos Java e Qt (VLC)
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

########## Se você usa placa AMD antiga/específica, mantenha esta; caso contrário, pode remover
env = HSA_OVERRIDE_GFX_VERSION,9.0.0 

########## Cursores #####################################################################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_SCALE,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

########## XDG Desktop Portal ###########################################################
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

######### Toolkit Backend ###############################################################
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb

######## Configurações QT (VLC e outros) ################################################
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

######## Outros #########################################################################
env = XDG_MENU_PREFIX,arch-
env = WLR_RENDERER_ALLOW_SOFTWARE, 1
env = _GLX_VENDOR_LIBRARY_NAME, mesa
env = WLR_NO_HARDWARE_CURSORS, 1

#########################################################################################
########## PERMISSIONS ##################################################################
#########################################################################################
########## See https://wiki.hyprland.org/Configuring/Permissions/ 
########## Please note permission changes here require a Hyprland restart and are not applied on-the-fly
########## for security reasons
# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#########################################################################################
########## LOOK AND FEEL ################################################################
#########################################################################################
########## Refer to https://wiki.hyprland.org/Configuring/Variables/
########## https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 0.5
    gaps_out = 2
    border_size = 2

########## https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

########## Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

########## Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
 }

########## https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 5
    rounding_power = 2

########## Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
  }

########## https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
  }
 }

########## https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

########## Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
 }

########## Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
########## "Smart gaps" / "No gaps when only"
########## uncomment all if you wish to use that.
########## workspace = w[tv1], gapsout:0, gapsin:0
########## workspace = f[1], gapsout:0, gapsin:0
########## windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
########## windowrule = rounding 0, floating:0, onworkspace:w[tv1]
########## windowrule = bordersize 0, floating:0, onworkspace:f[1]
########## windowrule = rounding 0, floating:0, onworkspace:f[1]

########## See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

########## See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
 }

######### https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_splash_rendering = true
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
 }

#########################################################################################
######### INPUT #########################################################################
#########################################################################################
######### https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = br
    kb_variant = abnt2
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = false

    sensitivity = -1.0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
     }
}
######## https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
#    workspace_swipe = false
}

######## Example per-device config
######## See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
#device {
#name = epic-mouse-v1
#    sensitivity = -0.5
#}
#cursor {
#no_hardware_cursors = true
#}

#########################################################################################
######### KEYBINDINGS ###################################################################
#########################################################################################
######### See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

######## Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod SHIFT, E, exit,                # reboot hyprland
bind = $mainMod, Q, killactive,                # mata janela ativa
bind = $mainMod, T, exec, $terminal            # abre terminal konsole
bind = $mainMod, RETURN, exec, $terminal       # abre terminal konsole
bind = $mainMod, E, exec, $simple_editor       # abre mousepad
bind = $mainMod, D, exec, $fileManager         # abre dolphin
bind = $mainMod ALT, Alt_L, exec, pkill rofi || rofi -normal-window -show drun -allow-images
# bind = $mainMod ALT, Alt_L, exec, $menu
# bind = $mainMod, M, exec, $menu                # abre rofi
bind = $mainMod, P, pseudo,                    # dwindle
bind = $mainMod SHIFT, P, togglesplit,         # dwindle
bind = $mainMod, SPACE, fullscreen, 1          # fullscreen com borda
bind = $mainMod SHIFT, SPACE, fullscreen       # fullscreen sem borda 
bind = $mainMod, B, exec, $internet_brownser   # abre firefox-developer-edition
bind = $mainMod, V, togglefloating,            # janela flutuante  
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, W, exec, killall waybar || waybar  # abrir e fechar waybar
bind = $mainMod, L, exec, /var/lib/flatpak/exports/bin/eu.jumplink.Learn6502
bind = $mainMod, Print, exec, hyprshot -m region --clipboard-only
bind = $mainMod, X, exec, /var/lib/flatpak/exports/bin/com.dosbox_x.DOSBox-X
# Lança o Konsole executando o script com um título específico para a regra acima funcionar
bind = $mainMod, F, exec, $terminal --title MagicFort-Terminal -e /home/cerbero/Fortran/magicfort.sh

#########################################################################################
########## MOVE FOCUS COM SUPER + SETAS #################################################
#########################################################################################
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#########################################################################################
######### TROCAR ESPACO TRABALHO COM SUPER + [0-9] ######################################
#########################################################################################
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

#########################################################################################
######### MOVE JANELA ATIVA PARA UM ESPACO DE TRABALHO COM SUPER + SHIFT + [0-9] ########
#########################################################################################
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

################################################################
####################  F keys  ##################################
################################################################
######### Mainmod + Function keys
bind = $mainMod, F1, exec, firefox
bind = $mainMod, F2, exec, konsole
bind = $mainMod, F3, exec, nano
bind = $mainMod, F4, exec, mousepad
bind = $mainMod, F5, exec, $terminal --title MagicFort-Terminal -e /home/cerbero/Fortran/magicfort.sh 
bind = $mainMod, F6, exec, /var/lib/flatpak/exports/bin/io.github.dman95.SASM 
bind = $mainMod, F7, exec, vlc 
bind = $mainMod, F8, exec, 
bind = $mainMod, F9, exec, 
bind = $mainMod, F10, exec,
bind = $mainMod, F11, exec,
bind = $mainMod, F12, exec,

######### Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

######## Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

#########################################################################################
######### MOVE/RESIZE JANELA COM SUPER + LMB/RMB (botao E/D mouse) E ARRASTANDO #########
#########################################################################################
bindm = $mainMod, mouse:272, movewindow        # mouse:272 (botao esquerdo do mouse)
bindm = $mainMod, mouse:273, resizewindow      # mouse:273 (botao direito do mouse)

######## Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

######## Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

