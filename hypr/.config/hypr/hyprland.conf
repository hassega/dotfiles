########## MAGICFORT RULES (MODERN V2) ##################################################
#########################################################################################

# Regras para o terminal do MagicFort
windowrule2 = float,title:^(MagicFort-Terminal)$
windowrule2 = size 600 400,title:^(MagicFort-Terminal)$
windowrule2 = move 65% 55%,title:^(MagicFort-Terminal)$

